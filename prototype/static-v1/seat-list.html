<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>座位列表 - 图书馆座位预约</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/custom.css" rel="stylesheet">
</head>
<body>
<div class="mobile-container">

  <div class="app-header">
    <a href="index.html" class="back-btn">&larr;</a>
    <div class="header-title">座位列表</div>
    <div class="header-action"></div>
  </div>

  <div class="content-area">

    <!-- 区域：自习区 A -->
    <div class="area-title">自习区 A（3F）</div>

    <a href="seat-detail.html" class="card-custom seat-card clickable text-decoration-none text-reset d-block">
      <div>
        <div class="seat-number">A-01</div>
        <div class="seat-meta">3F · 靠窗 · 有电源</div>
      </div>
      <span class="badge-status badge-available">可约</span>
    </a>

    <div class="card-custom seat-card">
      <div>
        <div class="seat-number">A-02</div>
        <div class="seat-meta">3F · 中间 · 有台灯</div>
      </div>
      <span class="badge-status badge-full">已满</span>
    </div>

    <a href="seat-detail.html" class="card-custom seat-card clickable text-decoration-none text-reset d-block">
      <div>
        <div class="seat-number">A-03</div>
        <div class="seat-meta">3F · 靠窗 · 有电源 + 台灯</div>
      </div>
      <span class="badge-status badge-available">可约</span>
    </a>

    <div class="card-custom seat-card">
      <div>
        <div class="seat-number">A-04</div>
        <div class="seat-meta">3F · 中间</div>
      </div>
      <span class="badge-status badge-disabled">停用</span>
    </div>

    <!-- 区域：自习区 B -->
    <div class="area-title">自习区 B（4F）</div>

    <a href="seat-detail.html" class="card-custom seat-card clickable text-decoration-none text-reset d-block">
      <div>
        <div class="seat-number">B-01</div>
        <div class="seat-meta">4F · 靠窗 · 有电源</div>
      </div>
      <span class="badge-status badge-available">可约</span>
    </a>

    <div class="card-custom seat-card">
      <div>
        <div class="seat-number">B-02</div>
        <div class="seat-meta">4F · 中间 · 有电源</div>
      </div>
      <span class="badge-status badge-full">已满</span>
    </div>

    <a href="seat-detail.html" class="card-custom seat-card clickable text-decoration-none text-reset d-block">
      <div>
        <div class="seat-number">B-03</div>
        <div class="seat-meta">4F · 靠窗 · 有台灯</div>
      </div>
      <span class="badge-status badge-available">可约</span>
    </a>

  </div>
</div>
</body>
</html>
