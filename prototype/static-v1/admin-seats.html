<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>座位管理 - 图书馆座位预约</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/custom.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">

  <div class="admin-sidebar">
    <div class="sidebar-logo">图书馆管理后台</div>
    <ul class="sidebar-menu">
      <li><a href="admin-reservations.html">预约管理</a></li>
      <li><a href="admin-seats.html" class="active">座位管理</a></li>
      <li><a href="admin-stats.html">数据统计</a></li>
      <li style="margin-top:40px;"><a href="admin-login.html">退出登录</a></li>
    </ul>
  </div>

  <div class="admin-main">
    <div class="admin-topbar">
      <div class="page-title">座位管理</div>
      <button class="btn btn-primary btn-sm" onclick="alert('新增座位（原型演示）')">+ 新增座位</button>
    </div>

    <div class="filter-bar">
      <div class="filter-group">
        <label>区域</label>
        <select>
          <option>全部</option>
          <option>自习区 A</option>
          <option>自习区 B</option>
        </select>
      </div>
      <div class="filter-group">
        <label>状态</label>
        <select>
          <option>全部</option>
          <option>可用</option>
          <option>停用</option>
        </select>
      </div>
      <button class="btn btn-primary btn-sm">查询</button>
    </div>

    <div class="table-custom">
    <table class="table table-custom" style="margin-bottom:0;">
      <thead>
        <tr>
          <th>座位编号</th>
          <th>区域</th>
          <th>楼层</th>
          <th>位置</th>
          <th>设施</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>A-01</td>
          <td>自习区 A</td>
          <td>3F</td>
          <td>靠窗</td>
          <td>电源、台灯</td>
          <td><span class="badge-status badge-available">可用</span></td>
          <td>
            <button class="btn btn-outline-primary btn-sm" onclick="alert('编辑座位（原型演示）')">编辑</button>
            <button class="btn btn-danger btn-sm" onclick="alert('停用座位（原型演示）')">停用</button>
          </td>
        </tr>
        <tr>
          <td>A-02</td>
          <td>自习区 A</td>
          <td>3F</td>
          <td>中间</td>
          <td>台灯</td>
          <td><span class="badge-status badge-available">可用</span></td>
          <td>
            <button class="btn btn-outline-primary btn-sm" onclick="alert('编辑座位（原型演示）')">编辑</button>
            <button class="btn btn-danger btn-sm" onclick="alert('停用座位（原型演示）')">停用</button>
          </td>
        </tr>
        <tr>
          <td>A-03</td>
          <td>自习区 A</td>
          <td>3F</td>
          <td>靠窗</td>
          <td>电源、台灯</td>
          <td><span class="badge-status badge-available">可用</span></td>
          <td>
            <button class="btn btn-outline-primary btn-sm" onclick="alert('编辑座位（原型演示）')">编辑</button>
            <button class="btn btn-danger btn-sm" onclick="alert('停用座位（原型演示）')">停用</button>
          </td>
        </tr>
        <tr>
          <td>A-04</td>
          <td>自习区 A</td>
          <td>3F</td>
          <td>中间</td>
          <td>-</td>
          <td><span class="badge-status badge-disabled">停用</span></td>
          <td>
            <button class="btn btn-outline-primary btn-sm" onclick="alert('编辑座位（原型演示）')">编辑</button>
            <button class="btn btn-primary btn-sm" onclick="alert('启用座位（原型演示）')">启用</button>
          </td>
        </tr>
        <tr>
          <td>B-01</td>
          <td>自习区 B</td>
          <td>4F</td>
          <td>靠窗</td>
          <td>电源</td>
          <td><span class="badge-status badge-available">可用</span></td>
          <td>
            <button class="btn btn-outline-primary btn-sm" onclick="alert('编辑座位（原型演示）')">编辑</button>
            <button class="btn btn-danger btn-sm" onclick="alert('停用座位（原型演示）')">停用</button>
          </td>
        </tr>
        <tr>
          <td>B-02</td>
          <td>自习区 B</td>
          <td>4F</td>
          <td>中间</td>
          <td>电源</td>
          <td><span class="badge-status badge-available">可用</span></td>
          <td>
            <button class="btn btn-outline-primary btn-sm" onclick="alert('编辑座位（原型演示）')">编辑</button>
            <button class="btn btn-danger btn-sm" onclick="alert('停用座位（原型演示）')">停用</button>
          </td>
        </tr>
        <tr>
          <td>B-03</td>
          <td>自习区 B</td>
          <td>4F</td>
          <td>靠窗</td>
          <td>台灯</td>
          <td><span class="badge-status badge-available">可用</span></td>
          <td>
            <button class="btn btn-outline-primary btn-sm" onclick="alert('编辑座位（原型演示）')">编辑</button>
            <button class="btn btn-danger btn-sm" onclick="alert('停用座位（原型演示）')">停用</button>
          </td>
        </tr>
      </tbody>
    </table>
    </div>

  </div>
</div>
</body>
</html>
