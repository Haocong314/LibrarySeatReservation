<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的预约 - 图书馆座位预约</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/custom.css" rel="stylesheet">
</head>
<body>
<div class="mobile-container">

  <div class="app-header">
    <a href="index.html" class="back-btn">&larr;</a>
    <div class="header-title">我的预约</div>
    <div class="header-action"></div>
  </div>

  <div class="content-area">

    <!-- 预约中 -->
    <div class="card-custom reservation-card">
      <div class="res-header">
        <span class="res-seat">A-01</span>
        <span class="badge-status badge-active">已预约</span>
      </div>
      <div class="res-info">
        <span>自习区 A · 3F</span>
        <span>07-10（周五）</span>
        <span>08:00 - 10:00</span>
      </div>
      <div class="mt-2">
        <button class="btn btn-danger btn-sm" onclick="alert('取消预约（原型演示）')">取消预约</button>
      </div>
    </div>

    <div class="card-custom reservation-card">
      <div class="res-header">
        <span class="res-seat">B-03</span>
        <span class="badge-status badge-active">已预约</span>
      </div>
      <div class="res-info">
        <span>自习区 B · 4F</span>
        <span>07-11（周六）</span>
        <span>14:00 - 16:00</span>
      </div>
      <div class="mt-2">
        <button class="btn btn-danger btn-sm" onclick="alert('取消预约（原型演示）')">取消预约</button>
      </div>
    </div>

    <!-- 已取消 -->
    <div class="card-custom reservation-card" style="opacity:0.6;">
      <div class="res-header">
        <span class="res-seat">A-03</span>
        <span class="badge-status badge-cancelled">已取消</span>
      </div>
      <div class="res-info">
        <span>自习区 A · 3F</span>
        <span>07-09（周四）</span>
        <span>10:00 - 12:00</span>
      </div>
    </div>

  </div>
</div>
</body>
</html>
