<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员登录 - 图书馆座位预约</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/custom.css" rel="stylesheet">
</head>
<body>
<div class="login-container">
  <div class="login-box">
    <div class="login-title">图书馆座位预约系统</div>
    <div class="login-sub">管理后台登录</div>

    <form onsubmit="event.preventDefault(); window.location.href='admin-reservations.html';">
      <div class="mb-3">
        <label class="form-label">管理员账号</label>
        <input type="text" class="form-control" placeholder="请输入管理员账号" value="admin">
      </div>
      <div class="mb-3">
        <label class="form-label">密码</label>
        <input type="password" class="form-control" placeholder="请输入密码" value="password">
      </div>
      <button type="submit" class="btn btn-primary btn-lg-block mt-3">登 录</button>
    </form>
  </div>
</div>
</body>
</html>
