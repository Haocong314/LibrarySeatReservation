<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>座位详情 - 图书馆座位预约</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/custom.css" rel="stylesheet">
</head>
<body>
<div class="mobile-container">

  <div class="app-header">
    <a href="seat-list.html" class="back-btn">&larr;</a>
    <div class="header-title">座位详情</div>
    <div class="header-action"></div>
  </div>

  <div class="content-area">

    <!-- 座位信息卡片 -->
    <div class="card-custom">
      <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
          <div style="font-size:32px;font-weight:700;">A-01</div>
          <div class="text-secondary" style="font-size:13px;">自习区 A · 3F · 靠窗</div>
        </div>
        <span class="badge-status badge-available" style="font-size:14px;">可预约</span>
      </div>
      <div style="font-size:13px;color:var(--text-secondary);">
        <span style="margin-right:16px;">🔌 有电源</span>
        <span>💡 有台灯</span>
      </div>
    </div>

    <!-- 时段状态 -->
    <div class="card-custom">
      <div style="font-size:16px;font-weight:700;margin-bottom:12px;">今日可约时段</div>
      <div class="time-slot-list">
        <div class="time-slot-item selected">
          <span class="time-label">08:00 - 10:00</span>
          <span class="badge-status badge-available">可约</span>
        </div>
        <div class="time-slot-item full">
          <span class="time-label">10:00 - 12:00</span>
          <span class="badge-status badge-full">已满</span>
        </div>
        <div class="time-slot-item">
          <span class="time-label">12:00 - 14:00</span>
          <span class="badge-status badge-available">可约</span>
        </div>
        <div class="time-slot-item full">
          <span class="time-label">14:00 - 16:00</span>
          <span class="badge-status badge-full">已满</span>
        </div>
        <div class="time-slot-item">
          <span class="time-label">16:00 - 18:00</span>
          <span class="badge-status badge-available">可约</span>
        </div>
        <div class="time-slot-item">
          <span class="time-label">18:00 - 20:00</span>
          <span class="badge-status badge-available">可约</span>
        </div>
        <div class="time-slot-item full">
          <span class="time-label">20:00 - 22:00</span>
          <span class="badge-status badge-full">已满</span>
        </div>
      </div>
    </div>

  </div>

  <!-- 底部固定按钮 -->
  <div class="bottom-fixed">
    <a href="reservation-create.html" class="btn btn-primary btn-lg-block">去预约</a>
  </div>
</div>
</body>
</html>
