<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>预约提交 - 图书馆座位预约</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/custom.css" rel="stylesheet">
</head>
<body>
<div class="mobile-container">

  <div class="app-header">
    <a href="seat-detail.html" class="back-btn">&larr;</a>
    <div class="header-title">提交预约</div>
    <div class="header-action"></div>
  </div>

  <div class="content-area">

    <!-- 确认卡片 -->
    <div class="confirm-card">
      <div class="confirm-label">座位</div>
      <div class="confirm-value">A-01</div>
      <div class="confirm-label mt-2">区域 / 楼层</div>
      <div class="confirm-value">自习区 A · 3F · 靠窗</div>
    </div>

    <!-- 日期选择 -->
    <div class="mb-3">
      <label class="form-label">预约日期</label>
      <select class="form-control">
        <option>2026-07-10（今天）</option>
        <option>2026-07-11（周六）</option>
        <option>2026-07-12（周日）</option>
      </select>
    </div>

    <!-- 时段选择 -->
    <div class="mb-3">
      <label class="form-label">选择时段</label>
      <div class="time-slot-list">
        <div class="time-slot-item selected">
          <span class="time-label">08:00 - 10:00</span>
          <span class="badge-status badge-available">可约</span>
        </div>
        <div class="time-slot-item full">
          <span class="time-label">10:00 - 12:00</span>
          <span class="badge-status badge-full">已满</span>
        </div>
        <div class="time-slot-item">
          <span class="time-label">12:00 - 14:00</span>
          <span class="badge-status badge-available">可约</span>
        </div>
        <div class="time-slot-item full">
          <span class="time-label">14:00 - 16:00</span>
          <span class="badge-status badge-full">已满</span>
        </div>
        <div class="time-slot-item">
          <span class="time-label">16:00 - 18:00</span>
          <span class="badge-status badge-available">可约</span>
        </div>
      </div>
    </div>

  </div>

  <!-- 底部固定按钮 -->
  <div class="bottom-fixed">
    <a href="my-reservations.html?new=1" class="btn btn-primary btn-lg-block">提交预约</a>
  </div>
</div>
</body>
</html>
