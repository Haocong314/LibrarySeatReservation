<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据统计 - 图书馆座位预约</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/custom.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">

  <div class="admin-sidebar">
    <div class="sidebar-logo">图书馆管理后台</div>
    <ul class="sidebar-menu">
      <li><a href="admin-reservations.html">预约管理</a></li>
      <li><a href="admin-seats.html">座位管理</a></li>
      <li><a href="admin-stats.html" class="active">数据统计</a></li>
      <li style="margin-top:40px;"><a href="admin-login.html">退出登录</a></li>
    </ul>
  </div>

  <div class="admin-main">
    <div class="admin-topbar">
      <div class="page-title">数据统计</div>
      <div style="font-size:13px;color:var(--text-secondary);">统计日期：2026-07-10</div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-cards">
      <div class="stat-card">
        <div class="stat-label">座位总数</div>
        <div class="stat-value">14</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">今日预约</div>
        <div class="stat-value">18</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">今日取消</div>
        <div class="stat-value">3</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">在约中</div>
        <div class="stat-value">15</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">可用座位</div>
        <div class="stat-value">12</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">使用率</div>
        <div class="stat-value">64.3%</div>
      </div>
    </div>

    <!-- 状态分布 -->
    <div class="card-custom" style="background:var(--card-bg);">
      <div style="font-size:16px;font-weight:700;margin-bottom:16px;">座位状态分布</div>
      <table class="table" style="margin-bottom:0;">
        <thead>
          <tr>
            <th>区域</th>
            <th>可用</th>
            <th>已满</th>
            <th>停用</th>
            <th>合计</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>自习区 A（3F）</td>
            <td><span class="badge-status badge-available">3</span></td>
            <td><span class="badge-status badge-full">1</span></td>
            <td><span class="badge-status badge-disabled">1</span></td>
            <td>5</td>
          </tr>
          <tr>
            <td>自习区 B（4F）</td>
            <td><span class="badge-status badge-available">2</span></td>
            <td><span class="badge-status badge-full">1</span></td>
            <td><span class="badge-status badge-disabled">0</span></td>
            <td>3</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 趋势区 -->
    <div class="card-custom mt-3" style="background:var(--card-bg);">
      <div style="font-size:16px;font-weight:700;margin-bottom:16px;">近7天预约趋势</div>
      <div style="display:flex;align-items:flex-end;gap:12px;height:160px;padding:10px 0;">
        <div style="flex:1;text-align:center;">
          <div style="background:var(--primary);height:60px;width:100%;border-radius:4px 4px 0 0;"></div>
          <div style="font-size:11px;margin-top:4px;">07-04</div>
          <div style="font-size:11px;color:var(--text-secondary);">12</div>
        </div>
        <div style="flex:1;text-align:center;">
          <div style="background:var(--primary);height:80px;width:100%;border-radius:4px 4px 0 0;"></div>
          <div style="font-size:11px;margin-top:4px;">07-05</div>
          <div style="font-size:11px;color:var(--text-secondary);">15</div>
        </div>
        <div style="flex:1;text-align:center;">
          <div style="background:var(--primary);height:50px;width:100%;border-radius:4px 4px 0 0;"></div>
          <div style="font-size:11px;margin-top:4px;">07-06</div>
          <div style="font-size:11px;color:var(--text-secondary);">10</div>
        </div>
        <div style="flex:1;text-align:center;">
          <div style="background:var(--primary);height:100px;width:100%;border-radius:4px 4px 0 0;"></div>
          <div style="font-size:11px;margin-top:4px;">07-07</div>
          <div style="font-size:11px;color:var(--text-secondary);">20</div>
        </div>
        <div style="flex:1;text-align:center;">
          <div style="background:var(--primary);height:70px;width:100%;border-radius:4px 4px 0 0;"></div>
          <div style="font-size:11px;margin-top:4px;">07-08</div>
          <div style="font-size:11px;color:var(--text-secondary);">14</div>
        </div>
        <div style="flex:1;text-align:center;">
          <div style="background:var(--primary);height:85px;width:100%;border-radius:4px 4px 0 0;"></div>
          <div style="font-size:11px;margin-top:4px;">07-09</div>
          <div style="font-size:11px;color:var(--text-secondary);">17</div>
        </div>
        <div style="flex:1;text-align:center;">
          <div style="background:var(--primary-light);height:90px;width:100%;border-radius:4px 4px 0 0;"></div>
          <div style="font-size:11px;margin-top:4px;font-weight:700;">07-10</div>
          <div style="font-size:11px;color:var(--text-secondary);">18</div>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
